# RDA min (floor) and max (ceiling / Tolerable Upper Intake Level) by
# nutrient, age, and gender.
#
# Source: nutrition/VitaminMinerals/VitaminMineral.swift (minTable / maxTable),
# originally from https://ods.od.nih.gov/factsheets/<Nutrient>-HealthProfessional
#
# Lookup: walk a nutrient's rows in order and return the first row whose
#   age <= max-age; pick the male or female column for the caller's gender.
#   The final row of every list uses max-age: .inf so it acts as the
#   trailing default. If no row matches (or the nutrient is absent), the
#   code returns 0.
#
# Units: copper, folate, folic-acid, selenium, vitamin-a, vitamin-b12, and
#   vitamin-k are in mcg; vitamin-d is in IU; everything else is in mg.
#
# Conventions:
#   - max-age is an inclusive ceiling (age <= max-age).
#   - Age-only nutrients (no M/F difference) repeat the same value in both
#     male and female columns, kept uniform for losslessness.
#   - Nutrients with no published threshold / UL emit a single .inf row of 0,
#     exactly matching what the source code returns.
#   - max-age: .inf represents infinity.
#
# Nutrients are listed in the app's fixed display order (vitaminMineralOrder).

calcium:
  unit: mg
  min:
    - { max-age: 0.5,  male: 200,  female: 200 }
    - { max-age: 1,    male: 260,  female: 260 }
    - { max-age: 3,    male: 700,  female: 700 }
    - { max-age: 8,    male: 1000, female: 1000 }
    - { max-age: 13,   male: 1300, female: 1300 }
    - { max-age: 18,   male: 1300, female: 1300 }
    - { max-age: 50,   male: 1000, female: 1000 }
    - { max-age: 70,   male: 1000, female: 1200 }
    - { max-age: .inf, male: 1200, female: 1200 }
  max:
    - { max-age: 0.5,  male: 1000, female: 1000 }
    - { max-age: 1,    male: 1500, female: 1500 }
    - { max-age: 8,    male: 2500, female: 2500 }
    - { max-age: 18,   male: 3000, female: 3000 }
    - { max-age: 50,   male: 2500, female: 2500 }
    - { max-age: .inf, male: 2000, female: 2000 }

